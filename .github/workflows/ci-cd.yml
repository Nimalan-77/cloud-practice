name: CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'my-gitops-project/app/**' # ONLY trigger if app code changes

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Permissions are required for WIF to request the identity token
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Authenticate to GCP using WIF
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/640095824150/locations/global/workloadIdentityPools/github-pool-for-argocd/providers/github-provider'
          service_account: 'github-deployer@cloud-run-490411.iam.gserviceaccount.com'

      # 2. Configure Docker to use Artifact Registry
      - name: 'Docker Auth'
        run: |-
          gcloud auth configure-docker asia-south1-docker.pkg.dev

      # 3. Build and Push the Docker image
      # We use the commit SHA as the tag instead of 'latest' for better versioning
      - name: Build and Push Image
        run: |-
          IMAGE_TAG=${{ github.sha }}
          IMAGE_NAME=asia-south1-docker.pkg.dev/640095824150/gke-repo/python-app:$IMAGE_TAG
          docker build -t $IMAGE_NAME ./my-gitops-project/app
          docker push $IMAGE_NAME
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 4. Update the Kubernetes manifest file
      # This is the "GitOps" part: we change the YAML file in the repo
      - name: Update Manifest
        run: |-
          sed -i "s|image: .*|image: asia-south1-docker.pkg.dev/640095824150/gke-repo/python-app:${{ env.IMAGE_TAG }}|g" my-gitops-project/k8s/deployment.yaml

      # 5. Commit the change back to the repo
      - name: Commit and Push changes
        run: |-
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add my-gitops-project/k8s/deployment.yaml
          git commit -m "chore: update image tag to ${{ env.IMAGE_TAG }} [skip ci]"
          git push